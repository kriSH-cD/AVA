version: '3.8'

services:
  voice-detection-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-detection-api
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-AVA-2026-910728}
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - voice-api-network

networks:
  voice-api-network:
    driver: bridge
